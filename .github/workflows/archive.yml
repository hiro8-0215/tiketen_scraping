name: Daily Archive to Google Drive

on:
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Google Drive用のライブラリをインストール
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Google Driveへバックアップ実行
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: python upload_to_gdrive.py
