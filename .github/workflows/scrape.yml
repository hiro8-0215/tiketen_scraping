name: Ticket Scraper

on:
  workflow_dispatch: # GitHubの画面から手動でボタンを押して実行できるよう、または外部API（cron-job.orgなど）からキックできるようにする設定

permissions:
  contents: write # 実行後にデータをGitHubに保存（プッシュ）するために必要

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴を取得（コミットに必要）

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Python 3.11 を使用
          
      - name: 依存関係パッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Playwright（ブラウザ）のインストール
        run: playwright install chromium
        
      - name: スクレイピングの実行
        run: python scraper.py
        
      - name: 取得したデータを保存（コミット＆プッシュ）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自動更新: チケットデータのスクレイピング"
          file_pattern: "data/**" # data/以下の全ファイル（サブフォルダ含む）を対象とする
